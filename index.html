<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ORION ULTRA PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #000000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background: rgba(20,20,20,0.9);
    padding:25px;
    border-radius:20px;
    width:380px;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
    border:1px solid rgba(0,255,255,0.2);
}

.logo{
    text-align:center;
    font-size:24px;
    color:#00f7ff;
    margin-bottom:10px;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#111;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00f7ff,#0072ff);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.03);
}

#resultado{
    margin-top:15px;
    text-align:center;
    color:#00ffcc;
}

canvas{
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 ORION</div>
<h2>Simulador PRO</h2>

<input id="balance" value="1500" placeholder="Balance ($)">
<input id="lot" value="0.30" placeholder="Lote">
<input id="leverage" value="500" placeholder="Leverage">
<input id="stopout" value="20" placeholder="Stop Out (%)">

<button onclick="simular()">Simular</button>
<button onclick="mejorLote()">Mejor lote</button>

<div id="resultado"></div>

<canvas id="grafico"></canvas>

</div>

<script>

let entradas = [0,300,700,1200,1800,2500,3300,4200,5200,7200,10200,
14200,19200,25200,32200,40200,49200,59200,69200,79200,89200,99200,109200,119200,129200];

let chart;

// SIMULACIÓN
function simular(){

let balance = parseFloat(document.getElementById("balance").value);
let lot = parseFloat(document.getElementById("lot").value);
let leverage = parseFloat(document.getElementById("leverage").value);
let stopout = parseFloat(document.getElementById("stopout").value);

if(isNaN(balance) || isNaN(lot)){
    resultado.innerHTML = "❌ Datos inválidos";
    return;
}

let pipValue = 0.0001 * (lot/0.01);

let equityArray = [];
let pipArray = [];

let muerto = false;
let muertePips = 0;

for(let drop=0; drop<=150000; drop+=500){

    let loss = 0;
    let ops = 0;

    for(let i=0;i<entradas.length;i++){
        if(drop >= entradas[i]){
            loss += (drop - entradas[i]) * pipValue;
            ops++;
        }
    }

    let margin = (lot * ops * 100000) / leverage;
    let equity = balance - loss;

    if(margin === 0) margin = 1;

    let marginLevel = (equity / margin) * 100;

    equityArray.push(equity);
    pipArray.push(drop);

    if(marginLevel <= stopout){
        muerto = true;
        muertePips = drop;
        break;
    }
}

resultado.innerHTML = muerto
? "💀 Margin Call en: <b>" + muertePips.toLocaleString() + " pips</b>"
: "🔥 Sobrevive todo el rango";

dibujarGrafico(pipArray, equityArray);
}

// MEJOR LOTE
function mejorLote(){

let balance = parseFloat(document.getElementById("balance").value);

let mejor = 0;

for(let lot=0.01; lot<=1; lot+=0.01){

    let pipValue = 0.0001 * (lot/0.01);
    let sobrevive = true;

    for(let drop=0; drop<=120000; drop+=1000){

        let loss = 0;

        for(let i=0;i<entradas.length;i++){
            if(drop >= entradas[i]){
                loss += (drop - entradas[i]) * pipValue;
            }
        }

        let equity = balance - loss;

        if(equity <= 0){
            sobrevive = false;
            break;
        }
    }

    if(sobrevive){
        mejor = lot;
    }
}

resultado.innerHTML = "✅ Mejor lote aprox: <b>" + mejor.toFixed(2) + "</b>";
}

// GRÁFICO
function dibujarGrafico(pips, equity){

if(chart) chart.destroy();

let ctx = document.getElementById("grafico");

chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: pips,
        datasets: [{
            label: 'Equity',
            data: equity,
            borderWidth: 2,
            tension: 0.2
        }]
    },
    options:{
        plugins:{legend:{labels:{color:"white"}}},
        scales:{
            x:{ticks:{color:"white"}},
            y:{ticks:{color:"white"}}
        }
    }
});
}

</script>

</body>
</html>
