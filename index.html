<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORION PRO</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0a0f1c;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:420px;
    padding:20px;
    background:#111;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo img{
    width:200px;
    max-width:100%;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#1a1a1a;
    color:white;
    font-size:16px;
}

/* BOTONES */
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

/* RESULTADO */
#resultado{
    margin-top:15px;
    text-align:center;
    font-size:18px;
    color:#00ffcc;
}

/* RESPONSIVE EXTRA */
@media(max-width:480px){
    .container{
        margin:10px;
        padding:15px;
    }

    .logo img{
        width:160px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
    <img src="logo.png" alt="ORION">
</div>

<input id="balance" placeholder="Balance ($)" value="1500">
<input id="lot" placeholder="Lote" value="0.30">
<input id="leverage" placeholder="Leverage" value="500">
<input id="stopout" placeholder="Stop Out (%)" value="20">

<button onclick="simular()">SIMULAR</button>

<div id="resultado"></div>

</div>

<script>

let entradas = [0,300,700,1200,1800,2500,3300,4200,5200,7200,10200,
14200,19200,25200,32200,40200,49200,59200,69200,79200,89200,99200,109200,119200,129200];

function simular(){

let balance = parseFloat(document.getElementById("balance").value);
let lot = parseFloat(document.getElementById("lot").value);
let leverage = parseFloat(document.getElementById("leverage").value);
let stopout = parseFloat(document.getElementById("stopout").value);

if(isNaN(balance) || isNaN(lot) || isNaN(leverage)){
    document.getElementById("resultado").innerHTML = "❌ Datos inválidos";
    return;
}

// valor del pip
let pipValue = 0.0001 * (lot/0.01);

// 🔥 VALIDACIÓN DE MUERTE INMEDIATA
let marginInicial = (lot * 100000) / leverage;

if(marginInicial > balance){
    document.getElementById("resultado").innerHTML =
    "💀 MUERTE INMEDIATA<br>No alcanza el margen para 1 operación";
    return;
}

let muerteExacta = 0;

// 🔥 CÁLCULO PRECISO (1 pip real)
for(let drop=0; drop<=150000; drop++){

    let loss = 0;
    let ops = 0;

    for(let i=0;i<entradas.length;i++){
        if(drop >= entradas[i]){
            loss += (drop - entradas[i]) * pipValue;
            ops++;
        }
    }

    let margin = (lot * ops * 100000) / leverage;
    let equity = balance - loss;

    if(margin === 0) continue;

    let marginLevel = (equity / margin) * 100;

    if(marginLevel <= stopout){
        muerteExacta = drop;
        break;
    }
}

document.getElementById("resultado").innerHTML =
"💀 Margin Call en:<br><b>" + muerteExacta.toLocaleString() + " pips</b>";

}

</script>

</body>
</html>
